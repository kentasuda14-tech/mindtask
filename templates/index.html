<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MindTask</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header id="app-header">
    <div class="header-left">
      <span class="app-logo">MindTask</span>
      <select id="doc-select"></select>
      <button id="btn-new-doc" class="btn btn-secondary" title="新規作成">＋</button>
    </div>
    <div class="header-right">
      <button id="btn-view-map" class="view-btn active">マップ</button>
      <button id="btn-view-tasks" class="view-btn">タスク</button>
      <button id="btn-status-settings" class="btn btn-secondary" title="ステータス管理" style="padding:4px 9px;font-size:14px">⚙</button>
      <span id="save-status">保存済み</span>
    </div>
  </header>

  <!-- モバイルタブ（スマホのみ表示） -->
  <div id="mobile-tabs">
    <button class="mob-tab active" data-panel="editor">✏ メモ</button>
    <button class="mob-tab" data-panel="map">🗺 マップ</button>
    <button class="mob-tab" data-panel="tasks">📋 タスク</button>
  </div>

  <!-- メインコンテンツ -->
  <main id="app-main">

    <!-- 左: アウトラインエディタ -->
    <div id="editor-panel">
      <div id="editor-toolbar">
        <span class="toolbar-hint">Enter: 追加　Tab: 子項目　Shift+Tab: 戻す　•••: タスク設定</span>
        <div class="toolbar-btns">
          <button id="btn-hide-completed" class="toolbar-action-btn">完了を非表示</button>
          <button id="btn-export-md" class="toolbar-action-btn" title="Markdownで書き出し">MD出力</button>
          <button id="btn-export-csv" class="toolbar-action-btn" title="タスクをCSVで書き出し">CSV出力</button>
        </div>
      </div>
      <div id="outline-editor"></div>
      <div id="add-item-footer">
        <button id="btn-add-item">＋ アイテムを追加</button>
      </div>
    </div>

    <!-- 区切り線（デスクトップのみ） -->
    <div id="panel-divider"></div>

    <!-- 右: マップ or タスクリスト -->
    <div id="view-panel">

      <!-- マップビュー -->
      <div id="map-view">
        <div id="map-controls">
          <button id="btn-zoom-in"    class="map-ctrl-btn" title="拡大">＋</button>
          <button id="btn-zoom-out"   class="map-ctrl-btn" title="縮小">－</button>
          <button id="btn-map-reset"  class="map-ctrl-btn" title="表示リセット">⌂</button>
        </div>
        <svg id="mindmap-canvas" xmlns="http://www.w3.org/2000/svg">
          <g id="world">
            <g id="edges-layer"></g>
            <g id="nodes-layer"></g>
          </g>
        </svg>
      </div>

      <!-- タスクリストビュー -->
      <div id="task-view" class="hidden">
        <div id="task-filters">
          <div class="quick-filter-row">
            <button class="quick-filter-btn active" data-filter="">全期間</button>
            <button class="quick-filter-btn" data-filter="today">今日</button>
            <button class="quick-filter-btn" data-filter="tomorrow">今日・明日</button>
            <button class="quick-filter-btn" data-filter="week">今週中</button>
          </div>
          <div class="filter-row">
            <select id="filter-status">
              <option value="active">未完了のみ</option>
              <option value="">全て</option>
              <option value="todo">未着手</option>
              <option value="in_progress">進行中</option>
              <option value="on_hold">保留</option>
              <option value="consulting">要相談</option>
              <option value="done">完了</option>
              <option value="someday">いつかやる</option>
              <option value="cancelled">キャンセル</option>
            </select>
            <select id="filter-priority">
              <option value="">全優先度</option>
              <option value="high">🔴 高</option>
              <option value="mid">🟡 中</option>
              <option value="low">🟢 低</option>
            </select>
            <select id="filter-assignee">
              <option value="">全担当</option>
              <option value="self">自分</option>
              <option value="delegated">依頼中</option>
              <option value="none">未設定</option>
            </select>
          </div>
          <div class="sort-controls">
            <span class="sort-label">並べ替え:</span>
            <button class="sort-btn active" data-sort="priority">優先度</button>
            <button class="sort-btn" data-sort="deadline">期限</button>
            <button class="sort-btn" data-sort="status">ステータス</button>
            <button class="sort-btn" data-sort="assignee">担当</button>
          </div>
        </div>
        <div id="task-list-container"></div>
      </div>

    </div>
  </main>

  <!-- プロパティポップアップ -->
  <div id="props-popup" class="hidden">
    <div class="pop-section">
      <label class="pop-check-row">
        <input type="checkbox" id="pop-is-task">
        <span>タスクにする</span>
      </label>
    </div>
    <div id="pop-task-extra" class="hidden">
      <div class="pop-section">
        <div class="pop-label">ステータス</div>
        <select id="pop-status" class="pop-status-select">
        </select>
      </div>
      <div class="pop-section">
        <div class="pop-label">📅 期限</div>
        <input type="date" id="pop-deadline">
      </div>
      <div class="pop-section">
        <div class="pop-label">優先度</div>
        <div class="pri-buttons">
          <button class="pri-btn" data-p="high">🔴 高</button>
          <button class="pri-btn" data-p="mid">🟡 中</button>
          <button class="pri-btn" data-p="low">🟢 低</button>
          <button class="pri-btn" data-p="">なし</button>
        </div>
      </div>
      <div class="pop-section">
        <div class="pop-label">👤 担当</div>
        <div class="assignee-presets">
          <button class="assignee-preset-btn" data-v="自分">自分</button>
          <button class="assignee-preset-btn" data-v="">未設定</button>
        </div>
        <input type="text" id="pop-assignee" class="pop-assignee-input" placeholder="担当者名を入力…">
      </div>
    </div>
    <div class="pop-section">
      <div class="pop-label">🎨 マーカー</div>
      <div class="marker-color-buttons">
        <button class="marker-color-btn" data-color="red"    title="赤"></button>
        <button class="marker-color-btn" data-color="yellow" title="黄"></button>
        <button class="marker-color-btn" data-color="green"  title="緑"></button>
        <button class="marker-color-btn" data-color="blue"   title="青"></button>
        <button class="marker-color-btn" data-color=""       title="なし">✕</button>
      </div>
    </div>
    <div class="pop-section">
      <div class="pop-label">🏷 スタンプ</div>
      <div class="marker-stamp-buttons">
        <button class="marker-stamp-btn" data-stamp="⭐" title="スター">⭐</button>
        <button class="marker-stamp-btn" data-stamp="🚩" title="フラグ">🚩</button>
        <button class="marker-stamp-btn" data-stamp="💡" title="アイデア">💡</button>
        <button class="marker-stamp-btn" data-stamp="❗" title="重要">❗</button>
        <button class="marker-stamp-btn" data-stamp=""   title="なし">✕</button>
      </div>
    </div>
  </div>

  <!-- ノートドロワー -->
  <div id="note-drawer">
    <div id="note-drawer-header">
      <div class="note-header-title">
        <span class="note-header-icon">📝</span>
        <span id="note-drawer-title"></span>
      </div>
      <button id="note-drawer-close" title="閉じる（Esc）">✕</button>
    </div>
    <div id="note-drawer-body">
      <div class="note-section-block">
        <div class="note-section-label">メモ</div>
        <textarea id="note-textarea" placeholder="自由にメモを入力…"></textarea>
      </div>
      <div class="note-section-block">
        <div class="note-links-header">
          <span class="note-section-label">🔗 リンク・添付</span>
          <button id="btn-add-link" class="note-add-link-btn">＋ 追加</button>
        </div>
        <p class="note-links-hint">Google Drive・Dropboxなどにアップしたファイルのリンクも貼れます</p>
        <div id="links-list"></div>
      </div>
    </div>
  </div>

  <!-- ステータス管理モーダル -->
  <div id="status-modal-overlay" class="hidden">
    <div id="status-modal">
      <div id="status-modal-header">
        <span class="status-modal-title">⚙ ステータス管理</span>
        <button id="status-modal-close" title="閉じる">✕</button>
      </div>
      <div id="status-modal-body">
        <p class="status-modal-hint">↑↓で並び替え、ラベルを編集できます。「完了扱い」にチェックすると完了フィルターに含まれます。</p>
        <div id="status-item-list"></div>
        <button id="btn-add-status" class="btn-add-status">＋ ステータスを追加</button>
      </div>
    </div>
  </div>

  <script src="/static/mindmap.js?v=8"></script>
</body>
</html>
